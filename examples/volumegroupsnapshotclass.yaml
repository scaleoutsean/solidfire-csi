apiVersion: groupsnapshot.storage.k8s.io/v1beta2
kind: VolumeGroupSnapshotClass
metadata:
  name: solidfire-group-snapclass-retain
driver: csi.solidfire.com
deletionPolicy: Retain
parameters:
  csi.storage.k8s.io/snapshotter-secret-name: solidfire-secret
  csi.storage.k8s.io/snapshotter-secret-namespace: default
  csi.storage.k8s.io/group-snapshotter-secret-name: solidfire-secret
  csi.storage.k8s.io/group-snapshotter-secret-namespace: default
  retention: "48:00:00"
  ensureSerialCreation: "false"
