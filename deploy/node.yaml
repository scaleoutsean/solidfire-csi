kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: solidfire-csi-node
  namespace: solidfire-csi
spec:
  selector:
    matchLabels:
      app: solidfire-csi-node
  template:
    metadata:
      labels:
        app: solidfire-csi-node
    spec:
      priorityClassName: system-node-critical
      hostNetwork: true
      hostPID: true
      hostIPC: true
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
      serviceAccountName: solidfire-csi-controller
      containers:
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: /var/lib/kubelet/plugins/csi.solidfire.com/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration

        - name: solidfire-csi-driver
          securityContext:
            privileged: true
          image: docker.io/scaleoutsean/solidfire-csi:latest
          imagePullPolicy: Always
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--debug"
            - "--node-id=$(NODE_ID)"
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SOLIDFIRE_ENDPOINT
              value: "192.168.1.34"
            - name: SOLIDFIRE_USER
              value: "admin"
            - name: SOLIDFIRE_PASSWORD
              value: "admin"
            - name: SOLIDFIRE_TENANT
              value: "k0s"
            - name: SFCSI_DISABLE_METRICS
              value: "true"
            - name: SFCSI_ATTACH_WAIT_SECONDS
              value: "120"
            - name: SFCSI_ATTACH_POLL_INTERVAL
              value: "2"
            - name: SFCSI_LOGIN_POST_SLEEP_MS
              value: "1000"
            - name: SFCSI_MAX_CONCURRENT_LOGINS
              value: "4"
            - name: SFCSI_RESCAN_SLEEP_MS
              value: "250"
            - name: SFCSI_ENABLE_REAPER
              value: "true"
            - name: SFCSI_REAPER_USE_CONTROLLER_ADVISORY
              value: "true"
            - name: SFCSI_REAPER_ADVISORY_CUTOFF_SECONDS
              value: "30"
            - name: SFCSI_REAPER_ADVISORY_LOCAL_CANDIDATE_THRESHOLD
              value: "8"
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: host-dev
              mountPath: /dev
            - name: host-run
              mountPath: /run
            - name: host-sys
              mountPath: /sys
      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.solidfire.com/
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-run
          hostPath:
            path: /run
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
