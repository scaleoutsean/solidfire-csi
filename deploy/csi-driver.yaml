---
# Source: solidfire-csi/templates/csidriver.yaml
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi.solidfire.com
  labels:
    helm.sh/chart: solidfire-csi-1.0.0
    app.kubernetes.io/name: solidfire-csi
    app.kubernetes.io/instance: solidfire-csi
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: solidfire-csi
    meta.helm.sh/release-namespace: solidfire-csi
spec:
  attachRequired: true
  podInfoOnMount: false
  # Enable Service Account Token via Secrets (Beta in K8s 1.35)
  tokenRequests:
    - audience: "csi.solidfire.com"
      expirationSeconds: 3600
  # Opt-in for delivering tokens via the Secrets field
  # serviceAccountTokenInSecrets: true # Uncomment on K8s 1.35+
  fsGroupPolicy: File
