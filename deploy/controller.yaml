apiVersion: v1
kind: ServiceAccount
metadata:
  name: solidfire-csi-controller
  namespace: solidfire-csi
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: solidfire-csi-controller-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments/status"]
    verbs: ["patch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csidrivers"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "update", "patch", "create", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["groupsnapshot.storage.k8s.io"]
    resources: ["volumegroupsnapshotclasses", "volumegroupsnapshotcontents", "volumegroupsnapshots", "volumegroupsnapshotcontents/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: solidfire-csi-controller-binding
subjects:
  - kind: ServiceAccount
    name: solidfire-csi-controller
    namespace: solidfire-csi
roleRef:
  kind: ClusterRole
  name: solidfire-csi-controller-role
  apiGroup: rbac.authorization.k8s.io
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: solidfire-csi-controller
  namespace: solidfire-csi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: solidfire-csi-controller
  template:
    metadata:
      labels:
        app: solidfire-csi-controller
    spec:
      # Enable host PID for single-node dev testing (allows nsenter into host PID namespace).
      # NOTE: This is a temporary, dev-only setting — do NOT use in production.
      hostPID: true
      serviceAccountName: solidfire-csi-controller
      priorityClassName: system-cluster-critical
      # Optional: schedule controller onto control-plane nodes by enabling
      # the `nodeSelector` below or by using the example `nodeAffinity`.
      # These are commented by default so the Deployment remains schedulable
      # on any node in single-node/dev clusters. Uncomment to pin to control-plane.
      # nodeSelector:
      #   node-role.kubernetes.io/control-plane: ""
      # Example nodeAffinity (preferred for multi-arch/topology rules):
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: node-role.kubernetes.io/control-plane
      #               operator: Exists
      # Tolerations: allow scheduling on control-plane nodes that are tainted.
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
      containers:
        # Sidecars
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v3.6.4
          args:
            - "--csi-address=$(ADDRESS)"
            - "--extra-create-metadata=true"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-attacher
          image: registry.k8s.io/sig-storage/csi-attacher:v4.6.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v1.11.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.4.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        # Driver
        - name: solidfire-csi-driver
          image: docker.io/scaleoutsean/solidfire-csi:latest
          imagePullPolicy: Always
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--debug"
            - "--volume-ready-timeout=120s"
            - "--volume-retry-timeout=15s"
            # Removed Node ID to run in Controller Mode (Node Services Disabled)
            # - "--node-id=$(NODE_ID)"
          securityContext:
            privileged: true
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Default Credentials for fallback
            - name: SOLIDFIRE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: endpoint
            - name: SOLIDFIRE_USER
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: username
            - name: SOLIDFIRE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: password
            # Default Tenant is OPTIONAL. If not provided, StorageClass parameters must specify it.
            # WARNING: Using a global tenant for multiple namespaces/users can be risky if
            # delete_behavior="delete" (Recycle Bin) is used, as users may inadvertently
            # reclaim volumes deleted by others.
            # - name: SOLIDFIRE_TENANT
            #   valueFrom:
            #     secretKeyRef:
            #       name: solidfire-secret
            #       key: tenant
            - name: SFCSI_DISABLE_METRICS
              value: "true"
            - name: SFCSI_REGISTER_NODE_IN_CONTROLLER
              value: "true"
            - name: SFCSI_ATTACH_WAIT_SECONDS
              value: "120"
            - name: SFCSI_ATTACH_POLL_INTERVAL
              value: "2"
            - name: SFCSI_LOGIN_POST_SLEEP_MS
              value: "1000"
            - name: SFCSI_MAX_CONCURRENT_LOGINS
              value: "4"
            - name: SFCSI_RESCAN_SLEEP_MS
              value: "250"
            - name: SFCSI_ENABLE_SESSION_POLLER
              value: "true"
            - name: SFCSI_SESSION_POLLER_INTERVAL_SECONDS
              value: "30"
            - name: SFCSI_ENABLE_REAPER
              value: "true"
            - name: SFCSI_REAPER_USE_CONTROLLER_ADVISORY
              value: "true"
            - name: SFCSI_REAPER_ADVISORY_CUTOFF_SECONDS
              value: "30"
            - name: SFCSI_REAPER_ADVISORY_LOCAL_CANDIDATE_THRESHOLD
              value: "8"
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
            - name: host-dev
              mountPath: /dev
            - name: host-etc-iscsi
              mountPath: /etc/iscsi
            - name: host-run
              mountPath: /run
            - name: host-sys
              mountPath: /sys
            - name: host-var-lib-iscsi
              mountPath: /var/lib/iscsi
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-etc-iscsi
          hostPath:
            path: /etc/iscsi
            type: Directory
        - name: host-run
          hostPath:
            path: /run
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-var-lib-iscsi
          hostPath:
            path: /var/lib/iscsi
            type: Directory
