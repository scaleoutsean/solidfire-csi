---
# Source: solidfire-csi/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: solidfire-csi-controller
  namespace: solidfire-csi
  labels:
    helm.sh/chart: solidfire-csi-1.0.0
    app.kubernetes.io/name: solidfire-csi
    app.kubernetes.io/instance: solidfire-csi
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: solidfire-csi-controller
  template:
    metadata:
      labels:
        app: solidfire-csi-controller
    spec:
      hostPID: true
      serviceAccountName: solidfire-csi-controller
      priorityClassName: system-cluster-critical
      nodeSelector:
        {}
      affinity:
        {}
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
      containers:
        # Sidecars
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v3.6.4
          args:
            - "--csi-address=$(ADDRESS)"
            - "--extra-create-metadata=true"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-attacher
          image: registry.k8s.io/sig-storage/csi-attacher:v4.6.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v1.11.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.4.0
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        # Driver
        - name: solidfire-csi-driver
          image: "ghcr.io/scaleoutsean/solidfire-csi:1.0.0"
          imagePullPolicy: Always
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--volume-ready-timeout=120s"
            - "--volume-retry-timeout=15s"
          securityContext:
            privileged: true
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Default Credentials for fallback
            - name: SOLIDFIRE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: endpoint
            - name: SOLIDFIRE_USER
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: username
            - name: SOLIDFIRE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: password
            # Commented out by default to encourage per-StorageClass Secrets for multi-tenancy testing
            # - name: SOLIDFIRE_TENANT
            #   valueFrom:
            #     secretKeyRef:
            #       name: solidfire-secret
            #       key: tenant
            - name: SFCSI_DISABLE_METRICS
              value: "true"
            - name: SFCSI_REGISTER_NODE_IN_CONTROLLER
              value: "true"
            - name: SFCSI_ATTACH_WAIT_SECONDS
              value: "120"
            - name: SFCSI_ATTACH_POLL_INTERVAL
              value: "2"
            - name: SFCSI_LOGIN_POST_SLEEP_MS
              value: "1000"
            - name: SFCSI_MAX_CONCURRENT_LOGINS
              value: "4"
            - name: SFCSI_RESCAN_SLEEP_MS
              value: "250"
            - name: SFCSI_ENABLE_SESSION_POLLER
              value: "true"
            - name: SFCSI_SESSION_POLLER_INTERVAL_SECONDS
              value: "30"
            - name: SFCSI_ENABLE_REAPER
              value: "true"
            - name: SFCSI_REAPER_USE_CONTROLLER_ADVISORY
              value: "true"
            - name: SFCSI_REAPER_ADVISORY_CUTOFF_SECONDS
              value: "30"
            - name: SFCSI_REAPER_ADVISORY_LOCAL_CANDIDATE_THRESHOLD
              value: "8"
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
            - name: host-dev
              mountPath: /dev
            - name: host-etc-iscsi
              mountPath: /etc/iscsi
            - name: host-run
              mountPath: /run
            - name: host-sys
              mountPath: /sys
            - name: host-var-lib-iscsi
              mountPath: /var/lib/iscsi
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-etc-iscsi
          hostPath:
            path: /etc/iscsi
            type: Directory
        - name: host-run
          hostPath:
            path: /run
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-var-lib-iscsi
          hostPath:
            path: /var/lib/iscsi
            type: Directory
