apiVersion: apps/v1
kind: Deployment
metadata:
  name: solidfire-csi-controller
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app: solidfire-csi-controller
  template:
    metadata:
      labels:
        app: solidfire-csi-controller
    spec:
      hostPID: {{ .Values.controller.hostPID }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      priorityClassName: system-cluster-critical
      nodeSelector:
        {{- toYaml .Values.controller.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.controller.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.controller.tolerations | nindent 8 }}
      containers:
        # Sidecars
        - name: csi-provisioner
          image: {{ .Values.controller.sidecars.provisioner.image }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--extra-create-metadata=true"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-attacher
          image: {{ .Values.controller.sidecars.attacher.image }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-resizer
          image: {{ .Values.controller.sidecars.resizer.image }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        - name: csi-snapshotter
          image: {{ .Values.controller.sidecars.snapshotter.image }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election=true"
            - "--v=5"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/

        # Driver
        - name: solidfire-csi-driver
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            {{- if eq .Values.driver.logLevel "debug" }}
            - "--debug"
            {{- end }}
            - "--volume-ready-timeout={{ .Values.driver.volumeReadyTimeout }}"
            - "--volume-retry-timeout={{ .Values.driver.volumeRetryTimeout }}"
          securityContext:
            privileged: true
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Default Credentials for fallback
            - name: SOLIDFIRE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: endpoint
            - name: SOLIDFIRE_USER
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: username
            - name: SOLIDFIRE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: password
            - name: SOLIDFIRE_TENANT
              valueFrom:
                secretKeyRef:
                  name: solidfire-secret
                  key: tenant
            - name: SFCSI_DISABLE_METRICS
              value: "{{ .Values.driver.disableMetrics }}"
            - name: SFCSI_REGISTER_NODE_IN_CONTROLLER
              value: "true"
            - name: SFCSI_ATTACH_WAIT_SECONDS
              value: "{{ .Values.driver.attachWaitSeconds }}"
            - name: SFCSI_ATTACH_POLL_INTERVAL
              value: "{{ .Values.driver.attachPollInterval }}"
            - name: SFCSI_LOGIN_POST_SLEEP_MS
              value: "{{ .Values.driver.loginPostSleepMs }}"
            - name: SFCSI_MAX_CONCURRENT_LOGINS
              value: "{{ .Values.driver.maxConcurrentLogins }}"
            - name: SFCSI_RESCAN_SLEEP_MS
              value: "{{ .Values.driver.rescanSleepMs }}"
            - name: SFCSI_ENABLE_SESSION_POLLER
              value: "{{ .Values.driver.enableSessionPoller }}"
            - name: SFCSI_SESSION_POLLER_INTERVAL_SECONDS
              value: "{{ .Values.driver.sessionPollerIntervalSeconds }}"
            - name: SFCSI_ENABLE_REAPER
              value: "{{ .Values.driver.enableReaper }}"
            - name: SFCSI_REAPER_USE_CONTROLLER_ADVISORY
              value: "{{ .Values.driver.reaperUseControllerAdvisory }}"
            - name: SFCSI_REAPER_ADVISORY_CUTOFF_SECONDS
              value: "{{ .Values.driver.reaperAdvisoryCutoffSeconds }}"
            - name: SFCSI_REAPER_ADVISORY_LOCAL_CANDIDATE_THRESHOLD
              value: "{{ .Values.driver.reaperLocalCandidateThreshold }}"
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
            - name: host-dev
              mountPath: /dev
            - name: host-etc-iscsi
              mountPath: /etc/iscsi
            - name: host-run
              mountPath: /run
            - name: host-sys
              mountPath: /sys
            - name: host-var-lib-iscsi
              mountPath: /var/lib/iscsi
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-etc-iscsi
          hostPath:
            path: /etc/iscsi
            type: Directory
        - name: host-run
          hostPath:
            path: /run
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-var-lib-iscsi
          hostPath:
            path: /var/lib/iscsi
            type: Directory
