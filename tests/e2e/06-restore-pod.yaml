apiVersion: v1
kind: Pod
metadata:
  name: test-restore-pod
  labels:
    app: busybox-restore
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["/bin/sh", "-c", "while true; do echo $(date) >> /mnt/data/restore_check; sleep 5; done"]
    volumeMounts:
    - name: data
      mountPath: /mnt/data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: test-restore-pvc
