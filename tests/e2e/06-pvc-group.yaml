apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: group-pvc-1
  labels:
    app: group-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: solidfire-bronze
