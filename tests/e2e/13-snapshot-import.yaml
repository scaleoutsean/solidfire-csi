apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotContent
metadata:
  name: imported-snap-content
spec:
  deletionPolicy: Delete
  driver: csi.solidfire.com
  source:
    # REPLACE "123" with your backend Snapshot ID (integer)
    snapshotHandle: "720:3121"
  volumeSnapshotRef:
    name: imported-snapshot
    namespace: default
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: imported-snapshot
  namespace: default
spec:
  source:
    volumeSnapshotContentName: imported-snap-content
  volumeSnapshotClassName: solidfire-snapclass
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: restored-from-import
spec:
  storageClassName: solidfire-bronze
  dataSource:
    name: imported-snapshot
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Must be >= source volume size
      storage: 1Gi
