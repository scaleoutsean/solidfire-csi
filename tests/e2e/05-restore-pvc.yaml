apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-restore-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: solidfire-gold
  dataSource:
    name: test-snapshot
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  resources:
    requests:
      storage: 1Gi
