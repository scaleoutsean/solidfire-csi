apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: default
spec:
  containers:
    - name: writer
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - echo 'Hello SolidFire' > /mnt/data/hello.txt && sleep 3600
      volumeMounts:
        - name: vol
          mountPath: /mnt/data
  tolerations:
    - key: node.kubernetes.io/disk-pressure
      operator: Exists
      effect: NoSchedule
  volumes:
    - name: vol
      persistentVolumeClaim:
        claimName: test-pvc
