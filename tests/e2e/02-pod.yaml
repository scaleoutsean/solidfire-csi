apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  securityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsNonRoot: true
  containers:
    - name: writer
      image: alpine:latest
      securityContext:
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
      command: ["/bin/sh", "-c"]
      args:
        - echo 'Hello SolidFire' > /mnt/data/hello.txt && sleep 3600
      volumeMounts:
        - name: vol
          mountPath: /mnt/data
  tolerations:
    - key: node.kubernetes.io/disk-pressure
      operator: Exists
      effect: NoSchedule
  volumes:
    - name: vol
      persistentVolumeClaim:
        claimName: test-pvc
